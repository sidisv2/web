<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aria Prop - Agentes de IA para el Sector Inmobiliario</title>
    <meta name="description" content="Automatiza la atención de tus inmuebles, cualifica leads y agenda visitas 24/7 con Aria Prop." />
    <!-- Use base href to ensure relative paths resolve properly on subroutes -->
    <base href="/" />

    <!-- Primary stylesheet (relative path to source CSS for emergency/static serving) -->
    <link rel="stylesheet" href="./src/index.css" />

    <!-- Emergency inline styles to ensure readable UI if external CSS fails to load -->
    <style>
      /* Emergency reset / readable styles */
      html,body{height:100%;margin:0;padding:0}
      body{font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial;line-height:1.4;background:#09090b;color:#e2e8f0;padding:18px}
      a{color:#60f0c8}
      h1,h2,h3,h4,h5,h6{color:#fff;margin:0 0 8px}
      p{margin:0 0 12px}
      .container{max-width:1100px;margin:0 auto}

      /* Ensure clickable elements show pointer */
      button,a,input[type="submit"],input[type="button"],.btn,[role="button"],.clickable{cursor:pointer!important}

      /* Minimal modal overlay styling to ensure modals are visible */
      .modal-overlay{position:fixed;inset:0;background:rgba(2,6,23,0.6);display:flex;align-items:center;justify-content:center;z-index:9999;padding:20px}
      .modal-card{width:100%;max-width:520px;background:linear-gradient(180deg,rgba(255,255,255,0.03),rgba(255,255,255,0.02));border:1px solid rgba(255,255,255,0.06);border-radius:12px;padding:16px}

      /* Basic accessibility helpers */
      .visually-hidden{position:absolute!important;height:1px;width:1px;overflow:hidden;clip:rect(1px,1px,1px,1px);white-space:nowrap}
    </style>

  </head>
  <body>
    <div id="root"></div>

    <!-- Vite / dev entry: use absolute /src path so bundler resolves correctly; fallback to relative in static environments handled by the above CSS link -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
